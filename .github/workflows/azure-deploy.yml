# GitHub Actions Workflow to build and deploy to Azure App Service
name: Build and Deploy to Azure Web App

on:
  push:
    branches:
      - main  # Trigger workflow on push to main branch
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout/Clone code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build production app (Vite + esbuild backend)
        run: npm run build

      - name: Package artifacts
        # Package the workspace so that the server has access to runtime file reading/writing (e.g. XML files inside src/)
        run: |
          zip -r release.zip . -x "node_modules/*" ".git/*" ".github/*" "dist/**/*.map"

      - name: Upload artifact for deployment
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: release.zip

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: 'production'
      url: ${{ steps.deploy-to-webapp.outputs.webapp-url }}

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: node-app

      - name: Unzip artifact
        run: |
          unzip release.zip
          rm release.zip

      - name: 'Deploy to Azure Web App'
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'YOUR_AZURE_WEB_APP_NAME' # REPLACE WITH YOUR AZURE WEB APP NAME
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }} # Add your Publish Profile to GitHub Secrets
          package: .
